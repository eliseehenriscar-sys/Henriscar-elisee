<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enskripsyon Kliyan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="cadastro-form">
            <h2>Enskripsyon Kliyan</h2>
            
            <div class="input-group">
                <label for="nome">Non Konplè</label>
                <input type="text" id="nome" name="nome" placeholder="Ekri non ou" required>
            </div>

            <div class="input-group">
                <label for="email">Imèl</label>
                <input type="email" id="email" name="email" placeholder="imelou@egzanp.com" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="nif">NIF/Matrikil</label>
                    <input type="text" id="nif" name="nif" placeholder="000-000-000-0">
                </div>
                <div class="input-group">
                    <label for="telefone">Telefòn</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(509) 0000-0000">
                </div>
            </div>

            <button type="submit">Enskri Kliyan</button>
        </form>
    </div>

</body>
</html>
